<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber 台灣車資計算機</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --secondary: #276EF1;
            --accent: #FFFFFF;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        .bg-blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            border-radius: 50%;
            animation: float 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(39, 110, 241, 0.2);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: rgba(147, 51, 234, 0.15);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 250px; /* Space for floating cards */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 30px) scale(1.1);
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .input-group:focus-within label {
            color: var(--secondary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 400;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(39, 110, 241, 0.15);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-group:focus-within .input-icon {
            color: var(--secondary);
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 3rem 1rem 1rem;
            /* Right padding for arrow, left 1rem since no icon */
            color: white;
            font-size: 1.1rem;
            font-weight: 400;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        select option {
            background-color: var(--bg-grad-2);
            color: white;
        }

        .quick-btns {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-increment {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            padding: 0.4rem 0;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-increment:hover {
            background: rgba(39, 110, 241, 0.2);
            border-color: var(--secondary);
            color: #fff;
        }

        .row {
            display: flex;
            gap: 1rem;
        }

        .row .input-group {
            flex: 1;
        }

        /* dual price layout */
        .result-group {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: flex-end;
            gap: 1rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        .price-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .price-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-value {
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }

        .price-value.standard {
            font-size: 1.4rem;
            opacity: 0.9;
        }

        .price-value.uberone {
            font-size: 2.2rem;
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .price-value span {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .result-card {
            position: fixed;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 2.5rem);
            max-width: 480px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1rem 1.25rem;
            text-align: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            animation: slideInUp 0.6s ease-out;
        }

        @keyframes slideInUp {
            from { transform: translate(-50%, 150%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .result-card:hover {
            background: rgba(15, 23, 42, 0.9);
        }

        .result-card::before {
            display: none;
        }

        .result-label {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-value.uberone span {
            color: rgba(255, 215, 0, 0.6);
        }

        .driver-earnings {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #10b981;
            padding: 0;
            background: transparent;
            border: none;
        }

        .details {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.25rem;
            padding-top: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Settings Accordion */
        .settings-toggle {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 1rem 0;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }

        .settings-toggle:hover {
            color: #fff;
        }

        .settings-toggle svg {
            transition: transform 0.3s;
        }

        .settings-toggle.active svg {
            transform: rotate(180deg);
        }

        .advanced-settings {
            display: none;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
            animation: fadeIn 0.4s;
        }

        .advanced-settings.open {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-reset {
            display: block;
            width: 100%;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
                align-items: flex-start;
                padding-bottom: 180px; /* Reduced space */
            }

            .container {
                padding: 1.25rem;
                border-radius: 16px;
                margin: 0.5rem 0;
            }

            .price-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-bottom: 0;
                border-bottom: none;
            }

            .price-label {
                font-size: 0.7rem;
            }

            .price-value.uberone {
                font-size: 1.8rem;
            }

            .price-value.standard {
                font-size: 1.3rem;
            }

            .row {
                flex-direction: column;
                gap: 0;
            }

            .btn-increment {
                padding: 0.6rem 0;
            }

            .driver-earnings {
                width: 100%;
                font-size: 0.95rem;
                padding: 0.5rem;
                margin-top: 0.5rem;
            }
            
            .result-card {
                padding: 1.25rem;
                max-width: 100%;
            }
            
            .details {
                margin-top: 0.75rem;
                padding-top: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <h1>Uber 車資計算</h1>
        <p class="subtitle">台灣地區・官方費率試算</p>

        <div class="input-group" style="margin-bottom: 1.5rem;">
            <label for="region">選擇地區</label>
            <div class="input-wrapper">
                <select id="region">
                    <option value="taipei">北北基 (基本48, 每公里25, 每分鐘3.4)</option>
                    <option value="taoyuan">桃園 (基本59, 每公里25, 每分鐘1.7)</option>
                    <option value="yilan">宜蘭 (基本92, 每公里20, 每分鐘1.2)</option>
                </select>
                <span style="position: absolute; right: 1rem; color: var(--text-muted); pointer-events: none;">▼</span>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="distance">行駛距離 (公里)</label>
                <div class="input-wrapper">
                    <span class="input-icon">📍</span>
                    <input type="number" id="distance" placeholder="例如: 5.2" step="0.1" min="0" inputmode="decimal">
                </div>
                <div class="quick-btns">
                    <button type="button" class="btn-increment" data-target="distance" data-val="1">+1 km</button>
                    <button type="button" class="btn-increment" data-target="distance" data-val="5">+5 km</button>
                    <button type="button" class="btn-increment" data-target="distance" data-val="10">+10 km</button>
                </div>
            </div>

            <div class="input-group">
                <label for="time">預估時間 (分鐘)</label>
                <div class="input-wrapper">
                    <span class="input-icon">⏱️</span>
                    <input type="number" id="time" placeholder="例如: 15" step="1" min="0" inputmode="numeric">
                </div>
                <div class="quick-btns">
                    <button type="button" class="btn-increment" data-target="time" data-val="1">+1 min</button>
                    <button type="button" class="btn-increment" data-target="time" data-val="5">+5 min</button>
                    <button type="button" class="btn-increment" data-target="time" data-val="10">+10 min</button>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label for="extraFee">額外加成 (元)</label>
            <div class="input-wrapper">
                <span class="input-icon">➕</span>
                <input type="number" id="extraFee" placeholder="例如: 100" step="1" min="0" inputmode="numeric">
            </div>
            <div class="quick-btns">
                <button type="button" class="btn-increment" data-target="extraFee" data-val="10">+10</button>
                <button type="button" class="btn-increment" data-target="extraFee" data-val="50">+50</button>
                <button type="button" class="btn-increment" data-target="extraFee" data-val="100">+100</button>
            </div>
        </div>

        <div class="settings-toggle" id="settingsToggle">
            進階費率設定
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>

        <div class="advanced-settings" id="advancedSettings">
            <div class="row">
                <div class="input-group">
                    <label for="baseFare">基本車資 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">💵</span>
                        <input type="number" id="baseFare" value="85" step="1" inputmode="numeric">
                    </div>
                </div>
                <div class="input-group">
                    <label for="minFare">最低車資 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🛡️</span>
                        <input type="number" id="minFare" value="85" step="1" inputmode="numeric">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="perKm">每公里費率 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🛣️</span>
                        <input type="number" id="perKm" value="25" step="0.5" inputmode="decimal">
                    </div>
                </div>
                <div class="input-group">
                    <label for="perMin">每分鐘費率 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">⏳</span>
                        <input type="number" id="perMin" value="2.5" step="0.1" inputmode="decimal">
                    </div>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 0;">
                <label for="surge">動態加成 (例如 1.2倍)</label>
                <div class="input-wrapper">
                    <span class="input-icon">⚡</span>
                    <input type="number" id="surge" value="1.0" step="0.1" min="1.0" inputmode="decimal">
                </div>
            </div>
        </div>

        <button type="button" class="btn-reset" id="resetBtn">
            🔄 清除歸零
        </button>
    </div>

    <div class="result-card">
        <div class="result-group">
            <div class="price-item">
                <div class="price-label">一般預估車資</div>
                <div class="price-value standard">
                    <span>NT$</span> <span id="totalFare">0</span>
                </div>
            </div>
            <div class="price-item">
                <div class="price-label">👑 Uber One 會員價 (95折)</div>
                <div class="price-value uberone">
                    <span>NT$</span> <span id="uberOneFare">0</span>
                </div>
            </div>
        </div>

        <div class="driver-earnings">
            司機實拿 (扣除25%): NT$ <span id="driverFare">0</span>
        </div>

        <div class="details">
            <span id="detailDistance">里程費: $0</span>
            <span id="detailTime">時間費: $0</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = [
                'distance', 'time', 'extraFee',
                'baseFare', 'perKm', 'perMin', 'surge', 'minFare'
            ];

            const regionRates = {
                'taipei': { baseFare: 48, perKm: 25, perMin: 3.4, minFare: 85 },
                'taoyuan': { baseFare: 59, perKm: 25, perMin: 1.7, minFare: 90 },
                'yilan': { baseFare: 92, perKm: 20, perMin: 1.2, minFare: 120 }
            };

            const elements = {};
            inputs.forEach(id => {
                elements[id] = document.getElementById(id);
                // Listen to standard input changes
                elements[id].addEventListener('input', calculateFare);
            });

            // Handle Region change
            const regionSelect = document.getElementById('region');
            regionSelect.addEventListener('change', (e) => {
                const rates = regionRates[e.target.value];
                elements.baseFare.value = rates.baseFare;
                elements.perKm.value = rates.perKm;
                elements.perMin.value = rates.perMin;
                elements.minFare.value = rates.minFare;
                calculateFare();
            });

            // Handle Quick Increment buttons
            document.querySelectorAll('.btn-increment').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.target.getAttribute('data-target');
                    const addVal = parseFloat(e.target.getAttribute('data-val'));
                    const currentVal = parseFloat(elements[targetId].value) || 0;

                    if (targetId === 'time') {
                        elements[targetId].value = Math.floor(currentVal + addVal);
                    } else {
                        elements[targetId].value = (currentVal + addVal).toFixed(1);
                    }
                    calculateFare();
                });
            });

            // Initialize default region values
            regionSelect.dispatchEvent(new Event('change'));

            // Toggle Advanced Settings
            const settingsToggle = document.getElementById('settingsToggle');
            const advancedSettings = document.getElementById('advancedSettings');

            settingsToggle.addEventListener('click', () => {
                advancedSettings.classList.toggle('open');
                settingsToggle.classList.toggle('active');
            });

            // Handle Reset Button
            document.getElementById('resetBtn').addEventListener('click', () => {
                elements.distance.value = '';
                elements.time.value = '';
                elements.extraFee.value = '';
                elements.surge.value = '1.0';

                // Re-trigger region set to ensure base fares are defaulted correctly
                regionSelect.dispatchEvent(new Event('change'));
            });

            function calculateFare() {
                const distance = parseFloat(elements.distance.value) || 0;
                const time = parseFloat(elements.time.value) || 0;
                const baseFare = parseFloat(elements.baseFare.value) || 0;
                const perKm = parseFloat(elements.perKm.value) || 0;
                const perMin = parseFloat(elements.perMin.value) || 0;
                const surge = parseFloat(elements.surge.value) || 1;
                const minFare = parseFloat(elements.minFare.value) || 0;
                const extraFee = parseFloat(elements.extraFee.value) || 0;

                const distanceFare = distance * perKm;
                const timeFare = time * perMin;

                let subTotal = baseFare + distanceFare + timeFare;
                subTotal = (subTotal * surge) + extraFee;

                // Apply min fare logic
                let total = Math.max(subTotal, minFare);

                // Default state when inputs are empty
                if (distance === 0 && time === 0) {
                    total = 0;
                }

                const totalUberOne = Math.round(total * 0.95);
                total = Math.round(total);

                // Update UI with animation
                let currentVal = parseInt(document.getElementById('totalFare').innerText.replace(/,/g, '')) || 0;
                animateValue('totalFare', currentVal, total, 300);

                let currentUberOneVal = parseInt(document.getElementById('uberOneFare').innerText.replace(/,/g, '')) || 0;
                animateValue('uberOneFare', currentUberOneVal, totalUberOne, 300);

                let currentDriverVal = parseInt(document.getElementById('driverFare').innerText.replace(/,/g, '')) || 0;
                let driverTotal = Math.round(total * 0.75);
                animateValue('driverFare', currentDriverVal, driverTotal, 300);

                document.getElementById('detailDistance').innerText = `里程費: $${Math.round(distanceFare)}`;
                document.getElementById('detailTime').innerText = `時間費: $${Math.round(timeFare)}`;
            }

            // Number animation function
            function animateValue(id, start, end, duration) {
                if (start === end) return;
                const obj = document.getElementById(id);
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        obj.innerHTML = end;
                    }
                };
                window.requestAnimationFrame(step);
            }
        });
    </script>
</body>

</html>
