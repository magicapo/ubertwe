<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber 台灣車資計算機</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6077934577293506"
        crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #000000;
            --secondary: #276EF1;
            --accent: #FFFFFF;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        .bg-blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            border-radius: 50%;
            animation: float 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(39, 110, 241, 0.2);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: rgba(147, 51, 234, 0.15);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 30px) scale(1.1);
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .input-group:focus-within label {
            color: var(--secondary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 400;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(39, 110, 241, 0.15);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-group:focus-within .input-icon {
            color: var(--secondary);
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 3rem 1rem 1rem;
            /* Right padding for arrow, left 1rem since no icon */
            color: white;
            font-size: 1.1rem;
            font-weight: 400;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        select option {
            background-color: var(--bg-grad-2);
            color: white;
        }

        .quick-btns {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-increment {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            padding: 0.4rem 0;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-increment:hover {
            background: rgba(39, 110, 241, 0.2);
            border-color: var(--secondary);
            color: #fff;
        }

        .row {
            display: flex;
            gap: 1rem;
        }

        .row .input-group {
            flex: 1;
        }

        /* Vehicle type grid */
        .fare-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        .fare-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            padding: 0.6rem 0.25rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }

        .fare-col:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .fare-type-icon {
            font-size: 1.3rem;
            line-height: 1;
        }

        .fare-type-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-align: center;
        }

        .fare-amount {
            font-size: 1.35rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .fare-currency {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* highlight the main (UberX) column */
        .fare-col.main-type .fare-type-label {
            color: var(--secondary);
        }

        .fare-col.main-type .fare-amount {
            font-size: 1.6rem;
            color: #60a5fa;
        }

        /* selected vehicle type */
        .fare-col {
            cursor: pointer;
        }

        .fare-col.active {
            background: rgba(39, 110, 241, 0.18);
            outline: 1px solid rgba(39, 110, 241, 0.5);
        }

        .fare-col.active .fare-type-label {
            color: #93c5fd;
        }

        .fare-col.active .fare-amount {
            color: #93c5fd;
        }

        .fare-col.main-type.active .fare-amount {
            color: #60a5fa;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(39, 110, 241, 0.15), rgba(39, 110, 241, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 1.5rem;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        @keyframes slideInUp {
            from {
                transform: translate(-50%, 150%);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .result-card:hover {
            background: rgba(15, 23, 42, 0.9);
        }

        .result-card::before {
            display: none;
        }

        .result-label {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }


        .driver-earnings {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #10b981;
            padding: 0;
            background: transparent;
            border: none;
        }

        .details {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.25rem;
            padding-top: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .visitor-stats {
            margin-top: 0.6rem;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.3px;
        }

        /* Settings Accordion */
        .settings-toggle {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 1rem 0;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }

        .settings-toggle:hover {
            color: #fff;
        }

        .settings-toggle svg {
            transition: transform 0.3s;
        }

        .settings-toggle.active svg {
            transform: rotate(180deg);
        }

        .advanced-settings {
            display: none;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
            animation: fadeIn 0.4s;
        }

        .advanced-settings.open {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-reset {
            display: block;
            width: 100%;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
                align-items: center;
            }

            .container {
                padding: 1.25rem;
                border-radius: 16px;
                margin: 0.5rem 0;
            }

            .fare-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 0.3rem;
            }

            .fare-col {
                padding: 0.5rem 0.1rem;
            }

            .fare-type-icon {
                font-size: 1.1rem;
            }

            .fare-type-label {
                font-size: 0.6rem;
            }

            .fare-amount {
                font-size: 1.1rem;
            }

            .fare-col.main-type .fare-amount {
                font-size: 1.3rem;
            }

            .row {
                flex-direction: column;
                gap: 0;
            }

            .btn-increment {
                padding: 0.6rem 0;
            }

            .driver-earnings {
                width: 100%;
                font-size: 0.95rem;
                padding: 0.5rem;
                margin-top: 0.5rem;
            }

            .result-card {
                padding: 1.25rem;
                max-width: 100%;
            }

            .details {
                margin-top: 0.75rem;
                padding-top: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <div class="input-group" style="margin-bottom: 1.5rem;">
            <label for="region">選擇地區</label>
            <div class="input-wrapper">
                <select id="region">
                    <option value="taipei">北北基 (基本48, 最低85, 每公里25, 每分鐘3.4)</option>
                    <option value="taoyuan">桃園 (基本59, 最低90, 每公里25, 每分鐘1.7)</option>
                    <option value="hsinchu">新竹 (基本75, 最低100, 每公里25, 每分鐘2.0)</option>
                    <option value="miaoli">苗栗 (基本65, 最低100, 每公里25, 每分鐘2.5)</option>
                    <option value="yilan">宜蘭 (基本92, 最低120, 每公里20, 每分鐘1.2)</option>
                    <option value="taichung">台中 (基本56, 最低85, 每公里25, 每分鐘2.7)</option>
                    <option value="changhua">彰化 (基本57, 最低85, 每公里24, 每分鐘2.0)</option>
                    <option value="nantou">南投 (基本58, 最低100, 每公里25, 每分鐘1.0)</option>
                    <option value="tainan">台南 (基本70, 最低85, 每公里25.5, 每分鐘0.6)</option>
                    <option value="kaohsiung">高雄 (基本70, 最低85, 每公里25.6, 每分鐘0.6)</option>
                    <option value="pingtung">屏東 (基本81, 最低100, 每公里25, 每分鐘1.0)</option>
                </select>
                <span style="position: absolute; right: 1rem; color: var(--text-muted); pointer-events: none;">▼</span>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="time">預估時間 (分鐘)</label>
                <div class="input-wrapper">
                    <span class="input-icon">⏱️</span>
                    <input type="number" id="time" placeholder="例如: 15" step="1" min="0" inputmode="numeric">
                </div>
                <div class="quick-btns">
                    <button type="button" class="btn-increment" data-target="time" data-val="1">+1 min</button>
                    <button type="button" class="btn-increment" data-target="time" data-val="5">+5 min</button>
                    <button type="button" class="btn-increment" data-target="time" data-val="10">+10 min</button>
                </div>
            </div>

            <div class="input-group">
                <label for="distance">行駛距離 (公里)</label>
                <div class="input-wrapper">
                    <span class="input-icon">📍</span>
                    <input type="number" id="distance" placeholder="例如: 5.2" step="0.1" min="0" inputmode="decimal">
                </div>
                <div class="quick-btns">
                    <button type="button" class="btn-increment" data-target="distance" data-val="1">+1 km</button>
                    <button type="button" class="btn-increment" data-target="distance" data-val="5">+5 km</button>
                    <button type="button" class="btn-increment" data-target="distance" data-val="10">+10 km</button>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label for="extraFee">額外加成 (元)</label>
            <div class="input-wrapper">
                <span class="input-icon">➕</span>
                <input type="number" id="extraFee" placeholder="例如: 100" step="1" min="0" inputmode="numeric">
            </div>
            <div class="quick-btns">
                <button type="button" class="btn-increment" data-target="extraFee" data-val="10">+10</button>
                <button type="button" class="btn-increment" data-target="extraFee" data-val="50">+50</button>
                <button type="button" class="btn-increment" data-target="extraFee" data-val="100">+100</button>
            </div>
        </div>



        <button type="button" class="btn-reset" id="resetBtn">
            🔄 清除歸零
        </button>

        <div class="result-card">
            <div class="fare-grid">
                <div class="fare-col main-type" title="菁英">
                    <div class="fare-type-icon">🚗</div>
                    <div class="fare-type-label">菁英</div>
                    <div class="fare-currency">NT$</div>
                    <div class="fare-amount" id="totalFare">0</div>
                </div>
                <div class="fare-col" title="尊榮">
                    <div class="fare-type-icon">🖤</div>
                    <div class="fare-type-label">尊榮</div>
                    <div class="fare-currency">NT$</div>
                    <div class="fare-amount" id="fareBlack">-</div>
                </div>
                <div class="fare-col" title="六人座">
                    <div class="fare-type-icon">🚐</div>
                    <div class="fare-type-label">六人座</div>
                    <div class="fare-currency">NT$</div>
                    <div class="fare-amount" id="fareXL">0</div>
                </div>
                <div class="fare-col" title="舒適">
                    <div class="fare-type-icon">⭐</div>
                    <div class="fare-type-label">舒適</div>
                    <div class="fare-currency">NT$</div>
                    <div class="fare-amount" id="fareComfort">0</div>
                </div>
                <div class="fare-col" title="純電舒適">
                    <div class="fare-type-icon">⚡</div>
                    <div class="fare-type-label">純電舒適</div>
                    <div class="fare-currency">NT$</div>
                    <div class="fare-amount" id="fareEV">0</div>
                </div>
            </div>

            <div class="driver-earnings">
                <span id="driverFareLabel">菁英</span> 司機實拿 (扣除25%): NT$ <span id="driverFare">0</span>
            </div>

            <div class="details">
                <span id="detailDistance">里程費: $0</span>
                <span id="detailTime">時間費: $0</span>
            </div>

            <div class="visitor-stats">
                <span>📈 累計造訪次數：<span id="visitCount">...</span> </span>
            </div>
        </div>

        <div class="settings-toggle" id="settingsToggle"
            style="margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem;">
            進階費率設定
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>

        <div class="advanced-settings" id="advancedSettings" style="border-top: none; padding-top: 0.5rem;">
            <div class="row">
                <div class="input-group">
                    <label for="baseFare">基本車資 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">💵</span>
                        <input type="number" id="baseFare" value="85" step="1" inputmode="numeric">
                    </div>
                </div>
                <div class="input-group">
                    <label for="minFare">最低車資 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🛡️</span>
                        <input type="number" id="minFare" value="85" step="1" inputmode="numeric">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="perKm">每公里費率 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🛣️</span>
                        <input type="number" id="perKm" value="25" step="0.5" inputmode="decimal">
                    </div>
                </div>
                <div class="input-group">
                    <label for="perMin">每分鐘費率 (元)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">⏳</span>
                        <input type="number" id="perMin" value="2.5" step="0.1" inputmode="decimal">
                    </div>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 0;">
                <label for="surge">動態加成 (例如 1.2倍)</label>
                <div class="input-wrapper">
                    <span class="input-icon">⚡</span>
                    <input type="number" id="surge" value="1.0" step="0.1" min="1.0" inputmode="decimal">
                </div>
            </div>
        </div>

        <!-- AdSense 廣告區塊 -->
        <div style="margin-top: 1.5rem; text-align: center; overflow: hidden; min-height: 90px;">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6077934577293506"
                data-ad-slot="9961623910" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = [
                'distance', 'time', 'extraFee',
                'baseFare', 'perKm', 'perMin', 'surge', 'minFare'
            ];

            const regionRates = {
                'taipei': {
                    baseFare: 48, perKm: 25, perMin: 3.4, minFare: 85,
                    black: { baseFare: 72, perKm: 37.5, perMin: 5.1, minFare: 128 },
                    xl: { baseFare: 62, perKm: 32.5, perMin: 4.4, minFare: 111 },
                    comfort: { baseFare: 58, perKm: 30, perMin: 4.1, minFare: 102 },
                    ev: { baseFare: 67, perKm: 35, perMin: 4.8, minFare: 119 }
                },
                'taoyuan': {
                    baseFare: 59, perKm: 25, perMin: 1.7, minFare: 90,
                    black: { baseFare: 89, perKm: 37.5, perMin: 2.6, minFare: 135 },
                    xl: { baseFare: 77, perKm: 32.5, perMin: 2.2, minFare: 117 },
                    comfort: { baseFare: 71, perKm: 30, perMin: 2.0, minFare: 108 },
                    ev: { baseFare: 83, perKm: 35, perMin: 2.4, minFare: 126 }
                },
                'hsinchu': {
                    baseFare: 75, perKm: 25, perMin: 2.0, minFare: 100,
                    black: { baseFare: 113, perKm: 37.5, perMin: 3.0, minFare: 150 },
                    xl: { baseFare: 98, perKm: 32.5, perMin: 2.6, minFare: 130 },
                    comfort: { baseFare: 90, perKm: 30, perMin: 2.4, minFare: 120 },
                    ev: { baseFare: 105, perKm: 35, perMin: 2.8, minFare: 140 }
                },
                'miaoli': {
                    baseFare: 65, perKm: 25, perMin: 2.5, minFare: 100,
                    black: { baseFare: 97.5, perKm: 37.5, perMin: 3.8, minFare: 150 },

                    ev: { baseFare: 113, perKm: 35, perMin: 1.4, minFare: 140 }
                }
            };

            const elements = {};
            inputs.forEach(id => {
                elements[id] = document.getElementById(id);
                // Listen to standard input changes
                elements[id].addEventListener('input', calculateFare);
            });

            // Handle Region change
            const regionSelect = document.getElementById('region');
            regionSelect.addEventListener('change', (e) => {
                const rates = regionRates[e.target.value];
                elements.baseFare.value = rates.baseFare;
                elements.perKm.value = rates.perKm;
                elements.perMin.value = rates.perMin;
                elements.minFare.value = rates.minFare;
                calculateFare();
            });

            // Handle Quick Increment buttons
            document.querySelectorAll('.btn-increment').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.target.getAttribute('data-target');
                    const addVal = parseFloat(e.target.getAttribute('data-val'));
                    const currentVal = parseFloat(elements[targetId].value) || 0;

                    if (targetId === 'time') {
                        elements[targetId].value = Math.floor(currentVal + addVal);
                    } else {
                        elements[targetId].value = (currentVal + addVal).toFixed(1);
                    }
                    calculateFare();
                });
            });

            // Initialize default region values
            regionSelect.dispatchEvent(new Event('change'));

            // Toggle Advanced Settings
            const settingsToggle = document.getElementById('settingsToggle');
            const advancedSettings = document.getElementById('advancedSettings');

            settingsToggle.addEventListener('click', () => {
                advancedSettings.classList.toggle('open');
                settingsToggle.classList.toggle('active');
            });

            // Handle Reset Button
            document.getElementById('resetBtn').addEventListener('click', () => {
                elements.distance.value = '';
                elements.time.value = '';
                elements.extraFee.value = '';
                elements.surge.value = '1.0';

                // Re-trigger region set to ensure base fares are defaulted correctly
                regionSelect.dispatchEvent(new Event('change'));
            });

            function calcTypeTotal(rates, distance, time, surge, extraFee, isEmpty) {
                if (rates === null) return null;
                if (isEmpty) return 0;
                const distF = distance * rates.perKm;
                const timeF = time * rates.perMin;
                let sub = (rates.baseFare + distF + timeF) * surge + extraFee;
                return Math.round(Math.max(sub, rates.minFare));
            }

            function calculateFare() {
                const distance = parseFloat(elements.distance.value) || 0;
                const time = parseFloat(elements.time.value) || 0;
                const baseFare = parseFloat(elements.baseFare.value) || 0;
                const perKm = parseFloat(elements.perKm.value) || 0;
                const perMin = parseFloat(elements.perMin.value) || 0;
                const surge = parseFloat(elements.surge.value) || 1;
                const minFare = parseFloat(elements.minFare.value) || 0;
                const extraFee = parseFloat(elements.extraFee.value) || 0;
                const isEmpty = distance === 0 && time === 0;

                const distanceFare = distance * perKm;
                const timeFare = time * perMin;

                let subTotal = baseFare + distanceFare + timeFare;
                subTotal = (subTotal * surge) + extraFee;

                let total = isEmpty ? 0 : Math.round(Math.max(subTotal, minFare));

                // Update main (UberX) fare
                let currentVal = parseInt(document.getElementById('totalFare').innerText.replace(/,/g, '')) || 0;
                animateValue('totalFare', currentVal, total, 300);

                document.getElementById('detailDistance').innerText = `里程費: $${Math.round(distanceFare)}`;
                document.getElementById('detailTime').innerText = `時間費: $${Math.round(timeFare)}`;

                // Update other vehicle type fares
                const region = regionRates[document.getElementById('region').value];
                const types = [
                    { id: 'fareBlack', key: 'black' },
                    { id: 'fareXL', key: 'xl' },
                    { id: 'fareComfort', key: 'comfort' },
                    { id: 'fareEV', key: 'ev' },
                ];

                types.forEach(({ id, key }) => {
                    const el = document.getElementById(id);
                    const typeRates = region[key];
                    if (typeRates === null) {
                        el.innerText = '–';
                    } else {
                        const prev = parseInt(el.innerText.replace(/[^\d]/g, '')) || 0;
                        const val = calcTypeTotal(typeRates, distance, time, surge, extraFee, isEmpty);
                        animateValue(id, prev, val, 300);
                    }
                });

                // Recalculate driver fare based on currently selected vehicle type
                fareValues['totalFare'] = total;
                types.forEach(({ id, key }) => {
                    const typeRates = region[key];
                    fareValues[id] = (typeRates === null) ? null
                        : calcTypeTotal(typeRates, distance, time, surge, extraFee, isEmpty);
                });
                updateDriverFare();

                // Increment query counter only once per visit session
                if (!window.hasQueried && !isEmpty && (distance > 0 || time > 0)) {
                    window.hasQueried = true;
                    if (typeof window.incrementQueryCounter === 'function') {
                        window.incrementQueryCounter();
                    }
                }
            }

            // Track selected vehicle type
            let selectedFareId = 'totalFare';
            let selectedFareLabel = '菁英';

            // Cache of latest computed fares for each vehicle type
            const fareValues = { totalFare: 0, fareBlack: null, fareXL: 0, fareComfort: 0, fareEV: 0 };

            function updateDriverFare() {
                const fareVal = fareValues[selectedFareId];
                if (fareVal === null || fareVal === undefined) return;
                const currentDriverVal = parseInt(document.getElementById('driverFare').innerText.replace(/,/g, '')) || 0;
                animateValue('driverFare', currentDriverVal, Math.round(fareVal * 0.75), 300);
                document.getElementById('driverFareLabel').innerText = selectedFareLabel;
            }

            // Click handlers for each fare column
            document.querySelectorAll('.fare-col').forEach(col => {
                col.addEventListener('click', () => {
                    // Skip unavailable columns (showing –)
                    const fareEl = col.querySelector('.fare-amount');
                    if (!fareEl || fareEl.innerText.trim() === '–') return;

                    document.querySelectorAll('.fare-col').forEach(c => c.classList.remove('active'));
                    col.classList.add('active');

                    selectedFareId = fareEl.id;
                    selectedFareLabel = col.querySelector('.fare-type-label').innerText;
                    updateDriverFare();
                });
            });

            // Set default active column
            document.querySelector('.fare-col.main-type').classList.add('active');

            // Number animation function
            function animateValue(id, start, end, duration) {
                if (start === end) return;
                const obj = document.getElementById(id);
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        obj.innerHTML = end;
                    }
                };
                window.requestAnimationFrame(step);
            }
        });
    </script>

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const visitorRef = ref(db, 'visitCount');
        const queryRef = ref(db, 'queryCount');

        // Simple Atomic Increment on page load
        runTransaction(visitorRef, (currentCount) => {
            return (currentCount || 0) + 1;
        });

        // UI Real-time Listeners
        onValue(visitorRef, (snap) => {
            const el = document.getElementById('visitCount');
            if (el) el.innerText = (snap.val() || 0).toLocaleString();
        });

        // Expose increment function
        window.incrementQueryCounter = () => {
            runTransaction(queryRef, (current) => (current || 0) + 1);
        };
        window.hasQueried = false;
    </script>
